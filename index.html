<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RiseUp Private Access</title>

  <style>
    body { 
      font-family: system-ui, Arial, sans-serif; 
      margin: 0; 
      background: #0b0f19; 
      color: #e8eefc; 
    }

    .wrap { 
      min-height: 100vh; 
      display: grid; 
      place-items: center; 
      padding: 24px; 
    }

    .card { 
      width: 100%; 
      max-width: 520px; 
      background: rgba(255,255,255,0.06); 
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; 
      padding: 22px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.35); 
    }

    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 16px; opacity: 0.85; line-height: 1.4; }

    label { 
      display: block; 
      margin: 14px 0 6px; 
      font-weight: 600; 
      font-size: 14px; 
    }

    input { 
      width: 100%; 
      padding: 12px; 
      border-radius: 12px; 
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.25); 
      color: #e8eefc; 
      outline: none; 
    }

    input:focus { 
      border-color: rgba(180, 210, 255, 0.65); 
    }

    .row { 
      display: flex; 
      gap: 10px; 
      margin-top: 14px; 
      flex-wrap: wrap; 
    }

    button { 
      cursor: pointer; 
      border: 0; 
      border-radius: 12px; 
      padding: 11px 14px; 
      font-weight: 700; 
    }

    .primary { 
      background: #4c7dff; 
      color: white; 
    }

    .ghost { 
      background: rgba(255,255,255,0.10); 
      color: #e8eefc; 
    }

    .error { 
      margin-top: 10px; 
      color: #ffb4b4; 
      display: none; 
    }

    .content { display: none; }
    .login { display: none; }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- LOGIN VIEW -->
    <div class="card login" id="loginView">
      <h1>RiseUp Private Access</h1>
      <p>This content is restricted. Please enter the passcode.</p>

      <label for="passcode">Passcode</label>
      <input id="passcode" type="password" placeholder="Enter passcode" autocomplete="off" />

      <div class="row">
        <button class="primary" id="signInBtn">Sign In</button>
      </div>

      <div class="error" id="errorMsg">Incorrect passcode.</div>
    </div>

    <!-- CONTENT VIEW -->
    <div class="card content" id="contentView">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Welcome</h1>
        <button class="ghost" id="signOutBtn">Sign Out</button>
      </div>

      <!-- 🔽 PUT YOUR REAL SITE CONTENT BELOW THIS 🔽 -->
      <p>You are successfully signed in.</p>
      <p>Replace this section with your actual RiseUp content.</p>
      <!-- 🔼 PUT YOUR REAL SITE CONTENT ABOVE THIS 🔼 -->

    </div>
  </div>

  <script>
    const PASSCODE = "RiseUp2026";

    const loginView = document.getElementById("loginView");
    const contentView = document.getElementById("contentView");
    const passInput = document.getElementById("passcode");
    const errorMsg = document.getElementById("errorMsg");

    function showLogin() {
      loginView.style.display = "block";
      contentView.style.display = "none";
      errorMsg.style.display = "none";
      passInput.value = "";
      passInput.focus();
    }

    function showContent() {
      loginView.style.display = "none";
      contentView.style.display = "block";
    }

    function signIn() {
      if (passInput.value === PASSCODE) {
        showContent();
      } else {
        errorMsg.style.display = "block";
      }
    }

    function signOut() {
      showLogin();
    }

    document.getElementById("signInBtn").addEventListener("click", signIn);
    document.getElementById("signOutBtn").addEventListener("click", signOut);

    passInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        signIn();
      }
    });

    // Always require login on page load
    showLogin();
  </script>

</body>
</html>
